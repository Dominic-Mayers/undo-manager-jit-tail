<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Documentation redirect</title>
</head>
<body>
  <p>Resolving documentation…</p>

  <script>
    const repo = "dominic-mayers/undo-manager-jit-tail";
    const npmPackage = "@dominic.mayers/undo-manager-jit-tail";

    function compareVersions(a, b) {
      const pa = a.split('.').map(Number);
      const pb = b.split('.').map(Number);
      for (let i = 0; i < 3; i++) {
        if ((pa[i] || 0) !== (pb[i] || 0)) {
          return (pa[i] || 0) - (pb[i] || 0);
        }
      }
      return 0;
    }

    async function resolve() {
      const params = new URLSearchParams(window.location.search);
      const version = params.get("v");
      const mode = params.get("mode");

      // Placeholder or missing version → fallback to main
      if (!version || version === "__VERSION__") {
        window.location.href = `https://github.com/${repo}/blob/main/README.md`;
        return;
      }

      try {
        const res = await fetch(`https://registry.npmjs.org/${npmPackage}`);
        const data = await res.json();

        const versions = Object.keys(data.versions).sort(compareVersions);

        // --- Normal mode ---
        if (mode === "last") {
          const nextVersion = versions.find(v => compareVersions(v, version) > 0);

          let target;

          if (nextVersion) {
            target = `https://github.com/${repo}/blob/v${nextVersion}/README.md`;
          } else {
            target = `https://github.com/${repo}/blob/main/README.md`;
          }

          window.location.href = target;
          return;
        }

        // --- Fallback (mode missing or unknown) ---
        let html = `<h2>Documentation options</h2>`;

        const nextVersion = versions.find(v => compareVersions(v, version) > 0);

        const lastTarget = nextVersion
          ? `https://github.com/${repo}/blob/v${nextVersion}/README.md`
          : `https://github.com/${repo}/blob/main/README.md`;

        const exactTarget = `https://github.com/${repo}/blob/v${version}/README.md`;
        const latestTarget = `https://github.com/${repo}/blob/main/README.md`;

        html += `
          <p>Missing or unknown mode parameter. Please choose:</p>
          <ul>
            <li><strong><a href="${lastTarget}">Documentation for this version (recommended)</a></strong></li>
            <li><a href="${exactTarget}">Documentation at version ${version}</a></li>
            <li><a href="${latestTarget}">Latest documentation</a></li>
          </ul>
        `;

        document.body.innerHTML = html;

      } catch (e) {
        console.error(e);
        document.body.innerHTML = `
          <p>Error fetching npm data.</p>
          <p><a href="https://github.com/${repo}/blob/main/README.md">Go to latest documentation</a></p>
        `;
      }
    }

    resolve();
  </script>
</body>
</html>
