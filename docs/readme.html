<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Documentation redirect</title>
  </head>
  <body>
    <p>Resolving documentation…</p>

    <script>
      const repo = "dominic-mayers/undo-manager-jit-tail";
      const npmPackage = "@dominic.mayers/undo-manager-jit-tail";

      function compareVersions(a, b) {
        const pa = a.split(".").map(Number);
        const pb = b.split(".").map(Number);
        for (let i = 0; i < 3; i++) {
          if ((pa[i] || 0) !== (pb[i] || 0)) {
            return (pa[i] || 0) - (pb[i] || 0);
          }
        }
        return 0;
      }

      async function resolve() {
        const params = new URLSearchParams(window.location.search);
        const version = params.get("v");
        const mode = params.get("mode");

        // Placeholder or missing version → fallback to main
        if (!version || version === "__VERSION__") {
          window.location.href = `https://github.com/${repo}/blob/main/README.md`;
          return;
        }

        try {
          const res = await fetch(`https://registry.npmjs.org/${npmPackage}`);
          if (!res.ok) {
            throw new Error(`npm registry responded with status ${res.status}`);
          }

          const data = await res.json();
          const versions = Object.keys(data.versions).sort(compareVersions);

          // Placeholder or malformed request should already have been handled earlier,
          // but we stay defensive here.
          if (!version || version === "__VERSION__") {
            window.location.href = `https://github.com/${repo}/blob/main/README.md`;
            return;
          }

          // In normal use, mode=last expects a real published npm version.
          if (mode === "last") {
            if (!versions.includes(version)) {
              document.body.innerHTML = `
        <h2>Unknown version</h2>
        <p>The requested version <code>${version}</code> is not a published npm version of <code>${npmPackage}</code>.</p>
        <ul>
          <li><a href="https://github.com/${repo}/blob/main/README.md">Latest documentation</a></li>
          <li><a href="https://www.npmjs.com/package/${encodeURIComponent(npmPackage)}">npm package page</a></li>
        </ul>
      `;
              return;
            }

            const nextVersion = versions.find(
              (v) => compareVersions(v, version) > 0,
            );

            // last(V) = next(V) if it exists, otherwise main
            if (!nextVersion) {
              window.location.href = `https://github.com/${repo}/blob/main/README.md`;
              return;
            }

            const githubReadmeUrl = `https://github.com/${repo}/blob/v${nextVersion}/README.md`;
            const githubRawReadmeUrl = `https://raw.githubusercontent.com/${repo}/v${nextVersion}/README.md`;

            const check = await fetch(githubRawReadmeUrl, { method: "HEAD" });

            if (check.ok) {
              window.location.href = githubReadmeUrl;
              return;
            }

            document.body.innerHTML = `
      <h2>Documentation discrepancy</h2>
      <p>
        The requested version <code>${version}</code> resolves to
        <code>${nextVersion}</code> according to npm, but the corresponding
        GitHub README could not be found.
      </p>
      <p>
        This usually means that version <code>${nextVersion}</code> exists on npm
        but the corresponding Git tag or README is missing on GitHub.
      </p>
      <ul>
        <li><a href="${githubReadmeUrl}">Expected GitHub README target</a></li>
        <li><a href="https://github.com/${repo}/tags">GitHub tags</a></li>
        <li><a href="https://www.npmjs.com/package/${encodeURIComponent(npmPackage)}">npm package page</a></li>
        <li><a href="https://github.com/${repo}/blob/main/README.md">Latest documentation</a></li>
      </ul>
    `;
            return;
          }

          // Fallback when mode is missing or unknown: offer choices, no redirect.
          let html = `<h2>Documentation options</h2>`;

          const versionExists = versions.includes(version);
          const nextVersion = versionExists
            ? versions.find((v) => compareVersions(v, version) > 0)
            : null;

          const lastTarget = nextVersion
            ? `https://github.com/${repo}/blob/v${nextVersion}/README.md`
            : `https://github.com/${repo}/blob/main/README.md`;

          const exactTarget = `https://github.com/${repo}/blob/v${version}/README.md`;
          const latestTarget = `https://github.com/${repo}/blob/main/README.md`;

          html += `
    <p>Missing or unknown mode parameter. Please choose:</p>
    <ul>
      <li><strong><a href="${lastTarget}">Documentation for this version (recommended)</a></strong></li>
      <li><a href="${exactTarget}">Documentation at version ${version}</a></li>
      <li><a href="${latestTarget}">Latest documentation</a></li>
    </ul>
  `;

          document.body.innerHTML = html;
        } catch (e) {
          console.error(e);
          document.body.innerHTML = `
    <p>Error resolving documentation.</p>
    <p><a href="https://github.com/${repo}/blob/main/README.md">Go to latest documentation</a></p>
  `;
        }
      }

      resolve();
    </script>
  </body>
</html>
